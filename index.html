<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

/* Background photo */
background:url("Snapchat-1874677597.jpg") ;

font-family:Arial;
overflow:hidden;
}

/* Background Video */
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
display:none;
}

/* Dark overlay for better visibility */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
display:none;
}

/* Photo */
.photo{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
margin-bottom:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
opacity:0;
transform:scale(0.3);
transition:all 1s ease;
}
.showPhoto{
opacity:1;
transform:scale(1);
}

/* Gift */
.gift{
width:120px;
height:120px;
background:red;
position:relative;
cursor:pointer;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.gift:before{
content:"";
position:absolute;
width:20px;
height:120px;
background:gold;
left:50%;
transform:translateX(-50%);
}

.gift:after{
content:"";
position:absolute;
width:120px;
height:20px;
background:gold;
top:50%;
transform:translateY(-50%);
}

.giftText{
margin-top:10px;
font-size:30px;
color:white;
}

/* Cake */


/* Cake layers */

@keyframes drop{
to{
transform:translateY(0);
opacity:1;
}
}

/* Candle */
.candle{
position:absolute;
width:12px;
height:50px;
background:white;
left:50%;
top:-30px;
transform:translateX(-50%) scale(0);
animation:candle .4s forwards 2.2s;
}

@keyframes candle{
to{transform:translateX(-50%) scale(1);}
}

/* Flame */
.flame{
width:12px;
height:20px;
background:orange;
border-radius:50%;
position:absolute;
top:-16px;
animation:flicker .2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1)}
to{transform:scale(1.3)}
}

/* Text */
.text{
margin-top:15px;
font-size:36px;
color:white;
letter-spacing:2px;
font-family:"Times New Roman";
}

/* Stars */
.star{
position:absolute;
width:8px;
height:8px;
clip-path:polygon(
50% 0%,61% 35%,98% 35%,
68% 57%,79% 91%,
50% 70%,21% 91%,
32% 57%,2% 35%,39% 35%
);
animation:fall linear infinite;
filter:drop-shadow(0 0 6px yellow);
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

</style>
</head>

<body>

<!-- Background Video -->
<video id="bgVideo" muted loop>
<source src="d:\birth11\shinchn111.mp4" type="video/mp4">
</video>

<div class="overlay" id="overlay"></div>

<img src="AKsha.jpg" class="photo" id="photo">

<div class="gift" onclick="openGift()" id="gift"></div>
<div class="giftText" id="giftText">Click the Gift 🎁</div>

<div class="cake" id="cake">
<div class="layer layer1"></div>
<div class="layer layer2"></div>
<div class="layer layer3"></div>
<div class="layer layer4"></div>
<div class="layer layer5"></div>

<div class="candle">
<div class="flame"></div>
</div>
</div>

<h1 class="text" id="typing"></h1>

<audio id="mysong">
<source src="shinchn - Copy.mp3" type="audio/mpeg">
</audio>

<script>

function openGift(){

document.getElementById("gift").style.display="none";
document.getElementById("giftText").style.display="none";

/* Show video */
let video = document.getElementById("bgVideo");
video.style.display = "block";
video.play();

/* Show overlay */
document.getElementById("overlay").style.display="block";

/* Show photo */
document.getElementById("photo").classList.add("showPhoto");

/* Show cake */
document.getElementById("cake").style.display="block";

/* Play song */
document.getElementById("mysong").play();

/* Start typing */
setTimeout(typeText,2500);

/* Stars */
for(let i=0;i<80;i++){
let star=document.createElement("div");
star.className="star";

let colors=["yellow","white","gold","pink","cyan"];
star.style.background=colors[Math.floor(Math.random()*colors.length)];

star.style.left=Math.random()*100+"vw";
star.style.animationDuration=(Math.random()*6+5)+"s";
star.style.top="-10px";

document.body.appendChild(star);
}
}

/* Typing effect */
const message="Happy Birthday Kothi 🐒";
let index=0;

function typeText(){
if(index < message.length){
document.getElementById("typing").innerHTML += message.charAt(index);
index++;
setTimeout(typeText,40);
}
}

</script>

</body>
</html>
